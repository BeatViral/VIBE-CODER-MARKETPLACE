<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex" />
    <title>Vibe Coder Marketplace</title>
    <script>
      (function () {
        var base = '/VIBE-CODER-MARKETPLACE';
        var path = window.location.pathname;
        var route = path.indexOf(base) === 0 ? path.slice(base.length) : path;
        if (!route || route === '/' || route === '/404.html') {
          route = '/';
        }
        var target = base + '/#' + route + window.location.search + window.location.hash;
        window.location.replace(target);
      })();
    </script>
  </head>
  <body>
    Redirecting to Vibe Coder Marketplace...
  </body>
</html>
